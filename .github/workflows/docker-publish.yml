name: Publish Docker Image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            digest_artifact: digests-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            digest_artifact: digests-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./cachepuppy_core
          file: ./cachepuppy_core/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=cachepuppy/cachepuppy,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest for merge job
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.digest_artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and tag manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Derive release version
        id: version
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ "$tag" != v* ]]; then
            echo "Release tag must start with 'v' (got: $tag)" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cachepuppy/cachepuppy
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          refs=()
          for digest in *; do
            refs+=("cachepuppy/cachepuppy@sha256:${digest}")
          done

          docker buildx imagetools create "${tags[@]}" "${refs[@]}"
