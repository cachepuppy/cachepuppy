apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cachepuppy-hpa
  namespace: cachepuppy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: cachepuppy
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
