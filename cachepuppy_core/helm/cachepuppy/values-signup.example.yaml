# Example values generated when a user signs up.
# Install:
#   helm upgrade --install cachepuppy ./cachepuppy_core/helm/cachepuppy \
#     --namespace cachepuppy-usr_01h2abc \
#     --create-namespace \
#     -f values-signup.example.yaml

tenant:
  id: usr_01h2abc

image:
  tag: stable

ingress:
  host: usr-01h2abc.cachepuppy.com
  tls:
    secretName: cachepuppy-usr-01h2abc-tls

config:
  phxHost: usr-01h2abc.cachepuppy.com

# Generated by the control plane; never commit real secrets.
secrets:
  releaseCookie: replace-me-release-cookie
  secretKeyBase: replace-me-secret-key-base
  jwtSecret: replace-me-jwt-secret

autoscaling:
  minReplicas: 1
  maxReplicas: 3
