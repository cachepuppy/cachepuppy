{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cachepuppy.secretName" . }}
  namespace: {{ include "cachepuppy.namespace" . }}
  labels:
    {{- include "cachepuppy.labels" . | nindent 4 }}
type: Opaque
data:
  release-cookie: {{ required "secrets.releaseCookie is required when secrets.existingSecret is empty" .Values.secrets.releaseCookie | b64enc | quote }}
  secret-key-base: {{ required "secrets.secretKeyBase is required when secrets.existingSecret is empty" .Values.secrets.secretKeyBase | b64enc | quote }}
  jwt-secret: {{ required "secrets.jwtSecret is required when secrets.existingSecret is empty" .Values.secrets.jwtSecret | b64enc | quote }}
{{- end }}
