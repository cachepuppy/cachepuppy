apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cachepuppy
  namespace: {{ include "cachepuppy.namespace" . }}
  labels:
    {{- include "cachepuppy.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "cachepuppy.headlessServiceName" . }}
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      {{- include "cachepuppy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cachepuppy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.statefulset.podAntiAffinity .Values.statefulset.topologySpread }}
      affinity:
        {{- if .Values.statefulset.podAntiAffinity }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "cachepuppy.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.statefulset.topologySpread }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "cachepuppy.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: cachepuppy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
            - name: epmd
              containerPort: 4369
            - name: dist
              containerPort: 9100
          envFrom:
            - configMapRef:
                name: {{ include "cachepuppy.configMapName" . }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RELEASE_NODE
              value: "{{ .Values.config.libclusterNodeBasename }}@$(POD_IP)"
            - name: RELEASE_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ include "cachepuppy.secretName" . }}
                  key: release-cookie
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "cachepuppy.secretName" . }}
                  key: secret-key-base
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cachepuppy.secretName" . }}
                  key: jwt-secret
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: cache-shards
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache-shards
      spec:
        accessModes:
          - ReadWriteMany
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
